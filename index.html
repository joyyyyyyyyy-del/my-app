<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Vocab"/>
<title>Vocab Match</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g1:#ecf7e6;--g2:#d4eacc;--g3:#b8d9a8;--g4:#84a38d;--g5:#5c7a65;
  --ff:'Nunito',sans-serif;--br:16px;--r:18px;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--g1);font-family:var(--ff)}

#shell{
  display:flex;width:100%;
  height:100dvh;
  position:relative;overflow:hidden;
  padding-top:env(safe-area-inset-top,0px);
  padding-bottom:env(safe-area-inset-bottom,0px);
}

/* drawer */
#drawer{
  position:absolute;top:0;left:0;height:100%;width:240px;
  background:var(--g2);z-index:50;
  transform:translateX(-100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  padding-top:calc(env(safe-area-inset-top,0px) + 60px);
  padding-left:12px;padding-right:12px;padding-bottom:16px;
  gap:5px;overflow:hidden;
}
#drawer.open{transform:translateX(0)}
#scrim{position:absolute;inset:0;background:rgba(0,0,0,.25);z-index:49;opacity:0;pointer-events:none;transition:opacity .28s}
#scrim.on{opacity:1;pointer-events:auto}

/* main */
#main{flex:1;display:flex;flex-direction:column;background:var(--g1);min-width:0;width:100%;overflow:hidden}
#topbar{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;background:var(--g2);border-bottom:1.5px solid var(--g3);flex-shrink:0}
#menu-btn{background:var(--g4);border:none;border-radius:12px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
#day-label{font-size:13px;font-weight:700;color:var(--g5);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#streak{font-size:13px;font-weight:700;color:var(--g5);flex-shrink:0}
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px 8px;-webkit-overflow-scrolling:touch}

/* sidebar elements */
.sb-top{font-size:13px;font-weight:700;color:var(--g5);padding:0 4px 6px;display:flex;align-items:center;gap:6px}
.sb-btn{background:transparent;border:1.5px solid var(--g3);border-radius:var(--br);padding:9px 10px;font-size:11px;color:var(--g5);cursor:pointer;transition:.15s;width:100%;font-family:var(--ff);font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px}
.sb-btn:active{background:var(--g3)}
.sb-btn.active{background:var(--g4);color:#fff;border-color:var(--g4)}
.sb-label-row{display:flex;align-items:center;justify-content:space-between;margin:8px 2px 4px}
.sb-label{font-size:9px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.08em}
.add-week-btn{background:var(--g4);color:#fff;border:none;border-radius:10px;width:22px;height:22px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.week-block{display:flex;flex-direction:column;gap:3px}
.week-swipe-wrap{position:relative;overflow:hidden;border-radius:var(--br)}
.week-delete-bg{position:absolute;right:0;top:0;bottom:0;width:64px;background:#e07070;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;border-radius:var(--br);pointer-events:none}
.week-header{position:relative;display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 10px;border-radius:var(--br);background:var(--g3);user-select:none;touch-action:pan-y;transition:background .15s,transform .2s ease}
.week-header.open{background:var(--g4)}
.week-header.open .week-label,.week-header.open .week-arrow{color:#fff}
.week-label{font-size:12px;font-weight:700;color:var(--g5);flex:1}
.week-arrow{font-size:10px;color:var(--g4);transition:transform .2s;line-height:1}
.week-header.open .week-arrow{transform:rotate(90deg);color:#fff}
.week-days{display:flex;flex-direction:column;gap:4px;padding-left:12px;overflow:hidden;transition:max-height .25s ease}
.week-days.collapsed{max-height:0}
.week-days.expanded{max-height:400px}
.day-btn{background:transparent;border:1.5px solid var(--g3);border-radius:12px;padding:7px 10px;font-size:11px;color:var(--g5);cursor:pointer;transition:.15s;width:100%;font-family:var(--ff);font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px}
.day-btn:active{background:var(--g3)}
.day-btn.active{background:var(--g4);color:#fff;border-color:var(--g4)}
.sb-footer{padding-top:10px;border-top:1.5px solid var(--g3);flex-shrink:0}
.how-to-btn{background:transparent;border:1.5px solid var(--g3);border-radius:var(--br);padding:9px 10px;font-size:12px;color:var(--g4);cursor:pointer;width:100%;font-family:var(--ff);font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.how-to-btn:active{background:var(--g3)}

/* confirm */
.confirm-overlay{background:rgba(92,122,101,.15);border-radius:16px;padding:14px;margin-top:4px}
.confirm-overlay p{font-size:11px;color:var(--g5);font-weight:700;margin-bottom:8px;text-align:center}
.confirm-overlay .btn-row{display:flex;gap:8px;justify-content:center}
.del-btn{background:#e07070;color:#fff;border:none;border-radius:12px;padding:8px 20px;font-size:12px;font-weight:700;cursor:pointer}
.can-btn{background:var(--g2);color:var(--g5);border:none;border-radius:12px;padding:8px 20px;font-size:12px;font-weight:700;cursor:pointer}

/* content elements */
.sec-title{font-size:16px;font-weight:800;color:var(--g5);text-align:center;margin-bottom:10px}
.wc-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}
.wc-pill{background:var(--g3);color:var(--g5);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700}
.input-row{display:flex;gap:8px;margin-bottom:10px}
.inp{flex:1;background:#fff;border:1.5px solid var(--g3);border-radius:var(--br);padding:11px 12px;font-size:14px;color:var(--g5);outline:none;font-family:var(--ff);font-weight:600;text-align:center;min-width:0}
.inp:focus{border-color:var(--g4)}
.btn-add{background:var(--g4);color:#fff;border:none;border-radius:var(--br);padding:11px 16px;font-size:13px;cursor:pointer;font-weight:700;font-family:var(--ff);white-space:nowrap}
.btn-add:active{background:var(--g5)}
.word-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;max-height:240px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.word-tag{display:flex;align-items:center;background:var(--g2);border-radius:14px;padding:10px 14px;font-size:13px;color:var(--g5);font-weight:600}
.word-tag span{flex:1;text-align:center}
.word-tag .del{background:transparent;border:none;color:var(--g4);cursor:pointer;font-size:20px;padding:0 2px}
.btn-start{background:var(--g4);color:#fff;border:none;border-radius:var(--br);padding:14px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--ff)}
.btn-start:active{background:var(--g5)}
.btn-start:disabled{opacity:.38;cursor:not-allowed}
.btn-ghost{background:var(--g2);color:var(--g5);border:none;border-radius:var(--br);padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--ff)}
.btn-ghost:active{background:var(--g3)}
.msg{font-size:13px;color:var(--g4);text-align:center;padding:24px;opacity:.7;font-weight:600}

/* game */
#content.game{overflow:hidden;display:flex;flex-direction:column;padding:12px 14px 8px}
.info-bar{display:flex;gap:8px;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0}
.badge{font-size:11px;font-weight:700;background:var(--g2);color:var(--g5);border-radius:20px;padding:5px 14px}
.page-dot-row{display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-shrink:0}
.page-dot{width:7px;height:7px;border-radius:50%;background:var(--g3)}
.page-dot.active{background:var(--g4)}
.match-layout{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;min-height:0}
.col-lbl{font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;text-align:center;flex-shrink:0}
.col-wrap{display:flex;flex-direction:column;min-height:0}
.col-cards{display:flex;flex-direction:column;gap:6px;flex:1;min-height:0}
.mcard{background:#fff;border:2px solid var(--g3);border-radius:var(--r);padding:4px 8px;font-size:12px;font-weight:600;color:var(--g5);cursor:pointer;transition:border-color .12s,background .12s,opacity .18s;display:flex;align-items:center;justify-content:center;text-align:center;font-family:var(--ff);word-break:break-word;line-height:1.35;flex:1;min-height:0}
.mcard:active:not(.matched):not(.wrong):not(.locked){border-color:var(--g4);background:var(--g2)}
.mcard.selected{border-color:var(--g5);background:var(--g2);border-width:2.5px}
.mcard.matched{opacity:.22;cursor:default;border-color:var(--g3);background:var(--g2)}
.mcard.wrong{border-color:#d97272;background:#fff0f0;animation:shk .35s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* result */
.result-box{background:var(--g2);border-radius:24px;padding:30px 24px;text-align:center;max-width:320px;margin:0 auto}
.result-box h3{font-size:19px;font-weight:800;color:var(--g5);margin-bottom:8px}
.result-box p{font-size:13px;color:var(--g4);margin-bottom:22px;font-weight:600;line-height:1.6}

/* all words */
.wf-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.wf-btn{background:var(--g2);border:1.5px solid var(--g3);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--g5);cursor:pointer;transition:.15s}
.wf-btn:active{background:var(--g3)}
.wf-btn.active{background:var(--g4);color:#fff;border-color:var(--g4)}
.vtable{width:100%;border-collapse:collapse}
.vtable th{font-size:11px;font-weight:700;color:var(--g4);text-align:center;padding:8px;border-bottom:1.5px solid var(--g3)}
.vtable td{font-size:12px;font-weight:600;color:var(--g5);padding:9px 8px;border-bottom:1px solid var(--g2);text-align:center}
.vtable tr:last-child td{border-bottom:none}
.pill{display:inline-block;font-size:11px;font-weight:700;background:var(--g3);color:var(--g5);border-radius:20px;padding:2px 9px}

/* onboarding */
#onboarding{position:absolute;inset:0;background:rgba(92,122,101,.38);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.ob-card{background:#fff;border-radius:28px;width:100%;max-width:340px;padding:28px 22px 22px;display:flex;flex-direction:column;align-items:center}
.ob-pic{display:flex;justify-content:center;margin-bottom:14px}
.ob-text{font-size:13px;font-weight:600;color:var(--g5);text-align:center;line-height:1.75;margin-bottom:20px}
.ob-text b{font-weight:800;color:var(--g4)}
.ob-bottom{width:100%;display:flex;align-items:center;justify-content:space-between}
.ob-dots{display:flex;gap:6px;align-items:center}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(--g3);transition:.2s}
.ob-dot.active{background:var(--g4);width:18px;border-radius:4px}
#ob-skip-btn{font-size:11px;font-weight:700;color:var(--g4);background:none;border:none;cursor:pointer;min-width:36px;padding:4px}
#ob-arrow-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center}
.ob-lang-bar{display:flex;gap:6px;justify-content:center;margin-bottom:10px;width:100%}
.ob-lang-btn{background:transparent;border:1.5px solid var(--g3);border-radius:20px;padding:4px 13px;font-size:11px;font-weight:700;color:var(--g4);cursor:pointer;font-family:var(--ff);transition:.15s}
.ob-lang-btn:active{background:var(--g2)}
.ob-lang-btn.active{background:var(--g4);color:#fff;border-color:var(--g4)}
.ob-tag{display:inline-flex;align-items:center;gap:5px;background:var(--g4);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;color:#fff;margin-bottom:10px;font-family:var(--ff)}
.ob-title{font-size:11px;font-weight:700;color:var(--g4);margin:0 0 10px;font-family:var(--ff);letter-spacing:.01em;text-align:center;width:100%}

/* ── Bulk Import ── */
#bulk-overlay{position:absolute;inset:0;background:rgba(92,122,101,.45);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px)}
.bulk-sheet{background:#fff;border-radius:28px 28px 0 0;width:100%;max-width:480px;padding:20px 20px 24px;display:flex;flex-direction:column;gap:12px;max-height:88vh;overflow-y:auto}
.bulk-drag-bar{width:40px;height:4px;background:var(--g3);border-radius:2px;margin:0 auto 4px}
.bulk-title{font-size:15px;font-weight:800;color:var(--g5)}
.bulk-hint{font-size:11px;color:var(--g4);font-weight:600;line-height:1.65;background:var(--g1);border-radius:12px;padding:10px 14px}
.bulk-hint code{background:var(--g2);border-radius:5px;padding:1px 6px;font-family:var(--ff);font-size:11px}
.bulk-textarea{width:100%;min-height:140px;border:1.5px solid var(--g3);border-radius:var(--br);padding:12px 14px;font-size:13px;font-family:var(--ff);font-weight:600;color:var(--g5);resize:none;outline:none;line-height:1.7;-webkit-overflow-scrolling:touch}
.bulk-textarea:focus{border-color:var(--g4)}
.bulk-textarea::placeholder{color:var(--g3);font-weight:500}
.bulk-count{font-size:11px;font-weight:700;color:var(--g4);text-align:right}
.bulk-preview{display:flex;flex-direction:column;gap:4px;max-height:120px;overflow-y:auto}
.bulk-row{font-size:11px;font-weight:600;font-family:var(--ff);background:var(--g2);border-radius:10px;padding:5px 12px;display:flex;gap:6px;align-items:center}
.bulk-row .bw{color:var(--g5);min-width:60px}
.bulk-row .bs{color:var(--g3);font-size:10px}
.bulk-row .bm{color:var(--g4);flex:1}
.bulk-row.err{background:#fff0f0;color:#d97272}
.bulk-btn-row{display:flex;gap:10px}
.btn-bulk-open{background:var(--g2);color:var(--g4);border:1.5px solid var(--g3);border-radius:var(--br);padding:11px 16px;font-size:13px;cursor:pointer;font-weight:700;font-family:var(--ff);display:flex;align-items:center;gap:6px;transition:.15s;flex:1;justify-content:center}
.btn-bulk-open:active{background:var(--g3)}

/* ── Sync Modal ── */
.sync-drawer-btn{background:transparent;border:1.5px solid var(--g3);border-radius:var(--br);padding:9px 10px;font-size:12px;color:var(--g4);cursor:pointer;width:100%;font-family:var(--ff);font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s;margin-top:6px}
.sync-drawer-btn:active{background:var(--g3)}
#sync-overlay{position:absolute;inset:0;background:rgba(92,122,101,.45);display:flex;align-items:flex-end;justify-content:center;z-index:300;padding-bottom:env(safe-area-inset-bottom,0px)}
.sync-sheet{background:#fff;border-radius:28px 28px 0 0;width:100%;max-width:480px;padding:20px 20px 28px;display:flex;flex-direction:column;gap:14px;max-height:90vh;overflow-y:auto}
.sync-drag-bar{width:40px;height:4px;background:var(--g3);border-radius:2px;margin:0 auto 2px}
.sync-sheet-title{font-size:15px;font-weight:800;color:var(--g5);display:flex;align-items:center;gap:7px}
.sync-section{display:flex;flex-direction:column;gap:8px}
.sync-label{font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.07em}
.sync-export-box{background:var(--g1);border:1.5px solid var(--g3);border-radius:var(--br);padding:11px 14px;font-size:11px;font-family:monospace;color:var(--g5);word-break:break-all;line-height:1.6;max-height:60px;overflow-y:auto;user-select:all;-webkit-user-select:all}
.sync-size-hint{font-size:11px;color:var(--g4);font-weight:600;text-align:right}
.sync-copy-btn{background:var(--g4);color:#fff;border:none;border-radius:var(--br);padding:14px;font-size:14px;font-weight:700;font-family:var(--ff);width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s}
.sync-copy-btn:active{background:var(--g5)}
.sync-copy-btn.copied{background:var(--g5)}
.sync-divider{border:none;border-top:1.5px solid var(--g2);margin:2px 0}
.sync-import-ta{width:100%;height:72px;border:1.5px solid var(--g3);border-radius:var(--br);padding:11px 14px;font-size:12px;font-family:var(--ff);font-weight:600;color:var(--g5);resize:none;outline:none;line-height:1.5;background:#fff;-webkit-overflow-scrolling:touch}
.sync-import-ta:focus{border-color:var(--g4)}
.sync-import-ta::placeholder{color:var(--g3);font-weight:500}
.sync-import-btn{background:var(--g4);color:#fff;border:none;border-radius:var(--br);padding:14px;font-size:14px;font-weight:700;font-family:var(--ff);width:100%;cursor:pointer;transition:.15s}
.sync-import-btn:active{background:var(--g5)}
.sync-import-btn:disabled{opacity:.38;cursor:not-allowed}
.sync-close-btn{background:var(--g2);color:var(--g5);border:none;border-radius:var(--br);padding:12px;font-size:13px;font-weight:700;font-family:var(--ff);width:100%;cursor:pointer;transition:.15s}
.sync-close-btn:active{background:var(--g3)}

/* ── 언어 스위처 (topbar) ── */
#lang-switcher{display:flex;flex-wrap:nowrap;gap:4px;align-items:center}
.lang-mode-btn{background:var(--g2);border:1.5px solid var(--g3);border-radius:20px;padding:3px 7px;font-size:10px;font-weight:700;color:var(--g4);cursor:pointer;font-family:var(--ff);transition:.15s;white-space:nowrap;flex-shrink:0}
.lang-mode-btn:active{opacity:.7}
.lang-mode-btn.active{background:var(--g4);color:#fff;border-color:var(--g4)}
.lang-mgr-btn{background:var(--g4);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;line-height:1}
.lang-mgr-btn:active{background:var(--g5)}

/* ── 언어 관리 바텀시트 ── */
#lang-modal-overlay{position:absolute;inset:0;background:rgba(92,122,101,.45);display:flex;align-items:flex-end;justify-content:center;z-index:400;padding-bottom:env(safe-area-inset-bottom,0px)}
.lang-modal-sheet{background:#fff;border-radius:28px 28px 0 0;width:100%;max-width:480px;padding:20px 20px 28px;display:flex;flex-direction:column;gap:14px;max-height:85vh;overflow-y:auto}
.lang-drag-bar{width:40px;height:4px;background:var(--g3);border-radius:2px;margin:0 auto 2px}
.lang-modal-title{font-size:15px;font-weight:800;color:var(--g5)}
.lang-item{display:flex;flex-direction:column;gap:8px;background:var(--g1);border-radius:14px;padding:12px 14px;border-left:3px solid var(--g4)}
.lang-item-top{display:flex;align-items:center;gap:8px}
.lang-item-name{flex:1;font-size:13px;font-weight:700;color:var(--g5);font-family:var(--ff)}
.lang-item-edit{background:var(--g2);border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--g4);cursor:pointer;font-family:var(--ff);white-space:nowrap}
.lang-item-del{background:#e07070;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;font-family:var(--ff);white-space:nowrap}
.lang-item-del:disabled{opacity:.3;cursor:not-allowed}
.lang-edit-row{display:none;gap:8px;align-items:center}
.lang-del-confirm{display:none;gap:8px;align-items:center;background:#fff0f0;border-radius:10px;padding:8px 12px}
.lang-del-msg{font-size:11px;font-weight:700;color:#c05050;flex:1;font-family:var(--ff)}
.lang-name-inp{flex:1;border:1.5px solid var(--g3);border-radius:var(--br);padding:9px 12px;font-size:13px;font-family:var(--ff);font-weight:600;color:var(--g5);outline:none;background:#fff}
.lang-name-inp:focus{border-color:var(--g4)}
.lang-save-btn{background:var(--g4);color:#fff;border:none;border-radius:var(--br);padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--ff);white-space:nowrap}

};
const COLOR_CHOICES=['pink','yellow','blue'];

function applyTheme(colorId){
  const c=LANG_COLORS[colorId]||LANG_COLORS.green;
  const r=document.documentElement.style;
  r.setProperty('--g1',c.g1);r.setProperty('--g2',c.g2);
  r.setProperty('--g3',c.g3);r.setProperty('--g4',c.g4);r.setProperty('--g5',c.g5);
}
function cL(){return state.langs[state.curLang]}

let state=load();
// ── 마이그레이션 ──
if(!state){
  state={langs:[makeLang(1,'L1')],curLang:0,seenOnboarding:false};
}else if(!state.langs){
  const lg=makeLang(1,'L1');
  if(state.weeks)lg.weeks=state.weeks;
  if(state.openWeeks)lg.openWeeks=state.openWeeks;
  if(state.curWeek)lg.curWeek=state.curWeek;
  if(state.curDay)lg.curDay=state.curDay;
  if(state.streak)lg.streak=state.streak;
  if(state.lastDate)lg.lastDate=state.lastDate;
  state={langs:[lg],curLang:0,seenOnboarding:state.seenOnboarding||false};
}
if(state.curLang===undefined)state.curLang=0;
if(state.seenOnboarding===undefined)state.seenOnboarding=false;
state.langs.forEach((lang,i)=>{
  if(/^제\d언어$/.test(lang.name))lang.name='L'+(i+1);
  if(!lang.color)lang.color=i===0?'green':COLOR_CHOICES[i-1]||COLOR_CHOICES[0];
});

function openDrawer(){

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('scrim').classList.remove('on');
}
function toggleDrawer(){
  document.getElementById('drawer').classList.contains('open')?closeDrawer():openDrawer();

function renderOB(){
  const pages=OB_CONTENT[obLang];
  const p=pages[obPage];
  const total=pages.length;
  const isLast=obPage===total-1;

  // 언어 선택 바
  document.getElementById('ob-lang-bar').innerHTML=
    ['ko','jp','en'].map(l=>
      `<button class="ob-lang-btn${obLang===l?' active':''}" data-lang="${l}">${l.toUpperCase()}</button>`
    ).join('');
  document.querySelectorAll('.ob-lang-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setObLang(btn.dataset.lang));
  });

  // SVG 이미지
  document.getElementById('ob-pic').innerHTML=p.finalHeart?HEART_SVG:(OB_SVGS[obPage]||'');

  // 태그 칩
  document.getElementById('ob-tag-wrap').innerHTML=
    `<span class="ob-tag">${p.emoji} ${p.tag}</span>`;

  // 소제목 [ ]
  document.getElementById('ob-title').className='ob-title';
  document.getElementById('ob-title').innerHTML=p.title?`[ ${p.title} ]`:'';

  // 본문
  const textEl=document.getElementById('ob-text');
  if(p.finalHeart){
    textEl.style.cssText='font-size:14px;font-weight:700;color:var(--g4);line-height:2;text-align:center;margin-bottom:20px';
  }else{
    textEl.style.cssText='';
  }
  textEl.innerHTML=p.body.replace(/\n/g,'<br>');

  // 도트
  document.getElementById('ob-dots').innerHTML=
    Array.from({length:total},(_,i)=>`<div class="ob-dot${i===obPage?' active':''}"></div>`).join('');

  // Skip 버튼
  const skipBtn=document.getElementById('ob-skip-btn');
  skipBtn.textContent=isLast?(p.lastLabel||'Start!'):'Skip';
  skipBtn.onclick=closeOB;

  // 화살표 버튼
  const arrowSvg=document.getElementById('ob-arrow-svg');
  if(isLast){
    arrowSvg.innerHTML='<rect width="36" height="36" rx="18" fill="#84a38d"/><path d="M14 10 L24 18 L14 26" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>';
  }else{
    arrowSvg.innerHTML='<circle cx="18" cy="18" r="16" stroke="#84a38d" stroke-width="2.5"/><path d="M14 10 L24 18 L14 26" stroke="#84a38d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
  }
  document.getElementById('ob-arrow-btn').onclick=isLast?closeOB:obNext;
}

function setObLang(lang){obLang=lang;obPage=0;renderOB();}
function obNext(){if(obPage<OB_CONTENT[obLang].length-1){obPage++;renderOB()}}
function openOnboarding(){obPage=0;renderOB();document.getElementById('onboarding').style.display='flex'}
function closeOB(){document.getElementById('onboarding').style.display='none';state.seenOnboarding=true;save(state)}

/* ── CYCLE ── */
function todayStr(){return new Date().toISOString().slice(0,10)}
function initCycle(){
  const t=todayStr();
  state.langs.forEach(lang=>{
    if(lang.lastDate!==t){
      if(lang.lastDate){const d=Math.floor((new Date(t)-new Date(lang.lastDate))/86400000);lang.streak=d===1?lang.streak+1:1}
      else lang.streak=1;
      lang.lastDate=t;
    }
  });
  save(state);
  applyTheme(cL().color);
  if(!state.seenOnboarding)openOnboarding();
  render();
}

/* ── LANG SWITCHER ── */
function renderLangSwitcher(){
  const sw=document.getElementById('lang-switcher');
  sw.innerHTML='';
  state.langs.forEach((lang,i)=>{
    const c=LANG_COLORS[lang.color]||LANG_COLORS.green;
    const isActive=i===state.curLang;
    const btn=document.createElement('button');
    btn.className='lang-mode-btn'+(isActive?' active':'');
    btn.textContent=lang.name.slice(0,3);
    btn.title=lang.name;
    btn.style.borderColor=c.main;
    btn.style.color=isActive?'#fff':c.main;
    if(isActive)btn.style.background=c.main; else btn.style.background='';
    btn.addEventListener('click',()=>switchLang(i));
    sw.appendChild(btn);
  });
  const mgBtn=document.createElement('button');
  mgBtn.className='lang-mgr-btn';
  mgBtn.style.background=LANG_COLORS[cL().color].main;
  mgBtn.textContent=state.langs.length<3?'+':'⚙';
  mgBtn.title=state.langs.length<3?'언어 추가':'언어 관리';
  mgBtn.style.fontSize=state.langs.length>=3?'11px':'14px';
  mgBtn.addEventListener('click',openLangModal);
  sw.appendChild(mgBtn);
}

function switchLang(i){
  state.curLang=i;
  allFilter='all';pendingDel=null;curView='day';
  applyTheme(cL().color);
  save(state);render();
}

function openLangModal(){
  renderLangModal();
  document.getElementById('lang-modal-overlay').style.display='flex';
}
function closeLangModal(){
  document.getElementById('lang-modal-overlay').style.display='none';
}

function renderLangModal(){
  const list=document.getElementById('lang-list');
  list.innerHTML='';
  state.langs.forEach((lang,i)=>{
    const c=LANG_COLORS[lang.color]||LANG_COLORS.green;
    const item=document.createElement('div');item.className='lang-item';
    item.style.borderLeftColor=c.main;

    // 상단 행
    const topRow=document.createElement('div');topRow.className='lang-item-top';
    const nameEl=document.createElement('div');nameEl.className='lang-item-name';
    nameEl.textContent=lang.name;nameEl.style.color=c.text;
    const editBtn=document.createElement('button');editBtn.className='lang-item-edit';editBtn.textContent='이름';
    editBtn.style.cssText=`background:${c.light};color:${c.text}`;
    const delBtn=document.createElement('button');delBtn.className='lang-item-del';delBtn.textContent='삭제';
    delBtn.disabled=state.langs.length<=1;
    topRow.appendChild(nameEl);

    // L2, L3 색상 스와치
    if(i>0){
      const sw=document.createElement('div');sw.className='lang-swatches';
      COLOR_CHOICES.forEach(cid=>{
        const cc=LANG_COLORS[cid];
        const s=document.createElement('button');
        s.style.cssText=`width:18px;height:18px;border-radius:50%;background:${cc.main};border:2.5px solid ${lang.color===cid?'#fff':'transparent'};box-shadow:${lang.color===cid?'0 0 0 2px '+cc.main:''};cursor:pointer;padding:0;flex-shrink:0`;
        s.title=cc.label;
        s.addEventListener('click',()=>{lang.color=cid;save(state);if(i===state.curLang)applyTheme(cid);renderLangModal();renderLangSwitcher();});
        sw.appendChild(s);
      });
      topRow.appendChild(sw);
    }
    topRow.appendChild(editBtn);topRow.appendChild(delBtn);
    item.appendChild(topRow);

    // 이름 편집 행
    const editRow=document.createElement('div');editRow.className='lang-edit-row';
    const nameInp=document.createElement('input');nameInp.className='lang-name-inp';
    nameInp.value=lang.name;nameInp.maxLength=12;nameInp.style.borderColor=c.main;
    const saveBtn=document.createElement('button');saveBtn.className='lang-save-btn';saveBtn.textContent='저장';
    saveBtn.style.background=c.main;
    const cancelBtn=document.createElement('button');cancelBtn.className='lang-cancel-btn';cancelBtn.textContent='취소';
    editBtn.addEventListener('click',()=>{editRow.style.display='flex';nameInp.value=lang.name;nameInp.focus();nameInp.select();});
    saveBtn.addEventListener('click',()=>{const v=nameInp.value.trim();if(v){lang.name=v;save(state);}editRow.style.display='none';renderLangModal();renderLangSwitcher();});
    cancelBtn.addEventListener('click',()=>{editRow.style.display='none';});
    nameInp.addEventListener('keydown',e=>{if(e.key==='Enter')saveBtn.click();if(e.key==='Escape')cancelBtn.click();});
    editRow.appendChild(nameInp);editRow.appendChild(saveBtn);editRow.appendChild(cancelBtn);
    item.appendChild(editRow);

    // 삭제 확인 행
    const delConfirm=document.createElement('div');delConfirm.className='lang-del-confirm';
    const delMsg=document.createElement('span');delMsg.className='lang-del-msg';delMsg.textContent=`"${lang.name}" 삭제할까요?`;
    const delYes=document.createElement('button');delYes.className='lang-item-del';delYes.textContent='삭제';delYes.style.padding='5px 12px';
    delYes.addEventListener('click',()=>{
      state.langs.splice(i,1);
      if(state.curLang>=state.langs.length)state.curLang=state.langs.length-1;
      applyTheme(cL().color);
      save(state);renderLangModal();renderLangSwitcher();
      allFilter='all';pendingDel=null;curView='day';render();
    });
    const delNo=document.createElement('button');delNo.className='lang-cancel-btn';delNo.textContent='취소';delNo.style.padding='5px 10px';
    delNo.addEventListener('click',()=>{delConfirm.style.display='none';});
    delBtn.addEventListener('click',()=>{if(state.langs.length<=1)return;delConfirm.style.display='flex';});
    delConfirm.appendChild(delMsg);delConfirm.appendChild(delYes);delConfirm.appendChild(delNo);
    item.appendChild(delConfirm);
    list.appendChild(item);
  });

  const addArea=document.getElementById('lang-add-area');
  addArea.innerHTML='';
  if(state.langs.length<3){
    const defaultName='L'+(state.langs.length+1);
    const row=document.createElement('div');row.className='lang-add-row';
    const inp=document.createElement('input');inp.className='lang-name-inp';
    inp.placeholder=`이름 (기본: ${defaultName})`;inp.maxLength=12;
    const addBtn=document.createElement('button');addBtn.className='lang-add-confirm-btn';addBtn.textContent='+ 추가';
    addBtn.addEventListener('click',()=>{
      const name=inp.value.trim()||defaultName;
      const newId=Math.max(...state.langs.map(l=>l.id))+1;
      const usedColors=state.langs.map(l=>l.color);
      const autoColor=COLOR_CHOICES.find(c=>!usedColors.includes(c))||COLOR_CHOICES[0];
      state.langs.push(makeLang(newId,name,autoColor));
      save(state);renderLangModal();renderLangSwitcher();inp.value='';
    });
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')addBtn.click();});
    row.appendChild(inp);row.appendChild(addBtn);addArea.appendChild(row);
  }else{
    const note=document.createElement('div');note.className='lang-max-note';
    note.textContent='최대 3개 언어까지 추가할 수 있어요.';addArea.appendChild(note);
  }
}

/* ── WEEK MANAGEMENT ── */
function addWeek(){
  const lang=cL();
  const idx=lang.weeks.length?Math.max(...lang.weeks.map(w=>w.idx))+1:1;
  lang.weeks.push(makeWeek(idx));
  if(!lang.openWeeks.includes(idx))lang.openWeeks.push(idx);
  save(state);renderSidebar();
}
function toggleWeek(idx){
  const lang=cL();
  const i=lang.openWeeks.indexOf(idx);
  if(i>=0)lang.openWeeks.splice(i,1);else lang.openWeeks.push(idx);
  save(state);renderSidebar();
}
function confirmDel(idx){pendingDel=idx;renderSidebar()}
function cancelDel(){pendingDel=null;renderSidebar()}
function doDelete(idx){
  const lang=cL();
  lang.weeks=lang.weeks.filter(w=>w.idx!==idx);
  lang.openWeeks=lang.openWeeks.filter(i=>i!==idx);
  if(lang.curWeek===idx&&lang.weeks.length){lang.curWeek=lang.weeks[0].idx;lang.curDay=1}
  pendingDel=null;save(state);
  if(curView==='day')showDay(lang.curWeek,lang.curDay);
  renderSidebar();
}

function setupSwipe(el,idx){
  let sx=0,cx=0,going=false;
  const T=50;
  const s=e=>{sx=e.touches?e.touches[0].clientX:e.clientX;going=true;cx=0};
  const m=e=>{if(!going)return;const x=(e.touches?e.touches[0].clientX:e.clientX)-sx;if(x<0){cx=Math.max(x,-72);el.style.transform=`translateX(${cx}px)`}};
  const u=()=>{if(!going)return;going=false;if(cx<=-T){el.style.transform='';confirmDel(idx)}else{el.style.transform='';cx=0}};
  el.addEventListener('touchstart',s,{passive:true});
  el.addEventListener('touchmove',m,{passive:true});
  el.addEventListener('touchend',u);
  el.addEventListener('mousedown',s);
  document.addEventListener('mousemove',m);
  document.addEventListener('mouseup',u);
}

/* ── RENDER ── */
function render(){
  const lang=cL();
  document.getElementById('streak').textContent='🔥 '+lang.streak+' days';
  renderLangSwitcher();
  renderSidebar();
  if(curView==='all')showAll();else showDay(lang.curWeek,lang.curDay);
}

function renderSidebar(){
  const lang=cL();
  const wl=document.getElementById('week-list');wl.innerHTML='';
  lang.weeks.forEach(week=>{
    const wi=week.idx,open=lang.openWeeks.includes(wi),isPend=pendingDel===wi;
    const block=document.createElement('div');block.className='week-block';
    const sw=document.createElement('div');sw.className='week-swipe-wrap';
    const bg=document.createElement('div');bg.className='week-delete-bg';bg.textContent='Delete';
    const hdr=document.createElement('div');hdr.className='week-header'+(open?' open':'');
    hdr.innerHTML=`<span style="font-size:14px">📅</span><span class="week-label">Week ${wi}</span><span class="week-arrow">▶</span>`;
    hdr.addEventListener('click',e=>{if(Math.abs(parseFloat(hdr.style.transform||'0'))>5)return;toggleWeek(wi)});
    sw.appendChild(bg);sw.appendChild(hdr);block.appendChild(sw);
    if(isPend){
      const c=document.createElement('div');c.className='confirm-overlay';
      const cp=document.createElement('p');cp.textContent=`Delete Week ${wi}? 🗑️`;
      const cr=document.createElement('div');cr.className='btn-row';
      const db=document.createElement('button');db.className='del-btn';db.textContent='Delete';
      db.addEventListener('click',()=>doDelete(wi));
      const cb=document.createElement('button');cb.className='can-btn';cb.textContent='Cancel';
      cb.addEventListener('click',cancelDel);
      cr.appendChild(db);cr.appendChild(cb);c.appendChild(cp);c.appendChild(cr);block.appendChild(c);
    }
    const dd=document.createElement('div');dd.className='week-days '+(open?'expanded':'collapsed');
    for(let d=1;d<=7;d++){
      const b=document.createElement('button');
      b.className='day-btn'+(lang.curWeek===wi&&lang.curDay===d&&curView==='day'?' active':'');
      b.innerHTML=`<span style="font-size:13px">${DAY_ICO[d]}</span> Day ${d}`;
      b.addEventListener('click',(()=>{const ww=wi,dd2=d;return()=>{curView='day';document.getElementById('btn-all').classList.remove('active');lang.curWeek=ww;lang.curDay=dd2;save(state);closeDrawer();renderSidebar();showDay(ww,dd2)}})());
      dd.appendChild(b);
    }
    block.appendChild(dd);wl.appendChild(block);setupSwipe(hdr,wi);
  });
}

function showAll(){
  const lang=cL();
  curView='all';
  document.getElementById('btn-all').classList.add('active');
  document.getElementById('day-label').textContent=`📋 ${lang.name} · All Words`;
  setScrollable();
  const c=document.getElementById('content');c.innerHTML='';
  const title=document.createElement('div');title.className='sec-title';
  title.innerHTML=`📋 All Words <span style="font-size:11px;background:var(--g4);color:#fff;border-radius:20px;padding:2px 10px;font-weight:700">${lang.name}</span>`;
  c.appendChild(title);
  const bar=document.createElement('div');bar.className='wf-bar';
  const allBtn=document.createElement('button');allBtn.className='wf-btn'+(allFilter==='all'?' active':'');allBtn.textContent='All';
  allBtn.addEventListener('click',()=>setFilter('all'));bar.appendChild(allBtn);
  lang.weeks.forEach(w=>{
    const wb=document.createElement('button');wb.className='wf-btn'+(allFilter===w.idx?' active':'');wb.textContent=`Week ${w.idx}`;
    wb.addEventListener('click',()=>setFilter(w.idx));bar.appendChild(wb);
  });
  c.appendChild(bar);
  const all=[];lang.weeks.forEach(w=>{for(let d=1;d<=5;d++)(w.days[d]||[]).forEach(x=>all.push({...x,week:w.idx,day:d}))});
  const fil=allFilter==='all'?all:all.filter(x=>x.week===allFilter);
  if(!fil.length){const m=document.createElement('p');m.className='msg';m.textContent='No words saved yet.';c.appendChild(m);return}
  const tbl=document.createElement('table');tbl.className='vtable';
  tbl.innerHTML='<thead><tr><th>Word</th><th>Meaning</th><th>Week</th><th>Day</th><th>Errors</th></tr></thead>';
  const tbody=document.createElement('tbody');

  tbl.appendChild(tbody);c.appendChild(tbl);
}

function getWeek(idx){return cL().weeks.find(w=>w.idx===idx)}

function showDay(wIdx,d){
  const lang=cL();
  if(!wIdx||!getWeek(wIdx)){if(lang.weeks.length){wIdx=lang.weeks[0].idx;d=1}else{setScrollable();document.getElementById('content').innerHTML='<p class="msg">Add a week to get started!</p>';return}}
  lang.curWeek=wIdx;lang.curDay=d;save(state);
  document.getElementById('day-label').textContent=`${lang.name} · Week ${wIdx} · Day ${d}`+(d<=5?' · Input':d===6?' · Review':' · Hard');

function getPool(week,d){
  if(d<=2)return[...(week.days[d]||[])];
  if(d===3)return[...(week.days[3]||[]),...(week.days[1]||[])];
  if(d===4)return[...(week.days[4]||[]),...(week.days[2]||[])];
  return[...(week.days[5]||[]),...(week.days[3]||[])];
}

/* ── GAME ── */
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function startGame(wIdx,d){const w=getWeek(wIdx);if(!w)return;launchGame(wIdx,getPool(w,d),d)}
function launchGame(wIdx,pool,day){
  const shuffled=shuffle([...pool]);const pages=[];
  for(let i=0;i<shuffled.length;i+=8)pages.push(shuffled.slice(i,i+8));
  runSession(wIdx,pages,day);
}
function runSession(wIdx,pages,day){
  const allWrong=[];let pi=0;
  function next(){
    if(pi<pages.length){
      playPage(wIdx,pages[pi],day,pi,pages.length,false,(wl)=>{
        wl.forEach(x=>{if(!allWrong.find(a=>a.word===x.word))allWrong.push(x)});
        pi++;next();
      });
    }else{
      if(allWrong.length>=2)showRetryScreen(wIdx,allWrong,day);
      else showFinal(wIdx,day,allWrong.length===0);
    }
  }
  next();
}

function showRetryScreen(wIdx,wrongWords,day){

  const rb=document.createElement('button');rb.className='btn-start';rb.textContent='▶ Retry Missed';rb.addEventListener('click',()=>startRetry(wIdx,wrongWords,day));
  const bb=document.createElement('button');bb.className='btn-ghost';bb.textContent='← Back';bb.addEventListener('click',()=>showDay(wIdx,day));
  btnRow.appendChild(rb);btnRow.appendChild(bb);box.appendChild(btnRow);wrap.appendChild(box);c.appendChild(wrap);
}

function startRetry(wIdx,words,day){
  const shuffled=shuffle([...words]);const pages=[];
  for(let i=0;i<shuffled.length;i+=8)pages.push(shuffled.slice(i,i+8));
  let pi=0;
  function next(){if(pi<pages.length){playPage(wIdx,pages[pi],day,pi,pages.length,true,()=>{pi++;next()})}else showFinal(wIdx,day,false)}
  next();
}

function playPage(wIdx,pairs,day,pageIdx,totalPages,isRetry,onDone){
  setGame();
  const content=document.getElementById('content');content.innerHTML='';
  const week=getWeek(wIdx);
  let matched=new Set(),tries=0,wrong=0,locked=false,selWord=null,selMean=null;
  const pageWrong=[];
  const wCards=shuffle(pairs.map((p,i)=>({...p,idx:i})));
  const mCards=shuffle(pairs.map((p,i)=>({...p,idx:i})));
  const n=pairs.length;

  function renderGame(){
    content.innerHTML='';
    const dotRow=document.createElement('div');dotRow.className='page-dot-row';
    for(let i=0;i<totalPages;i++){const d=document.createElement('div');d.className='page-dot'+(i===pageIdx?' active':'');dotRow.appendChild(d)}
    content.appendChild(dotRow);
    const infoBar=document.createElement('div');infoBar.className='info-bar';
    const b1=document.createElement('div');b1.className='badge';b1.textContent=(isRetry?'🔁 · ':'')+`✅ ${matched.size}/${n}`;
    const b2=document.createElement('div');b2.className='badge';b2.textContent=`🎯 ${tries}`;
    const b3=document.createElement('div');b3.className='badge';b3.textContent=`❌ ${wrong}`;
    infoBar.appendChild(b1);infoBar.appendChild(b2);infoBar.appendChild(b3);content.appendChild(infoBar);
    const layout=document.createElement('div');layout.className='match-layout';
    [wCards,mCards].forEach((cards,ci)=>{
      const wrap=document.createElement('div');wrap.className='col-wrap';
      const lbl=document.createElement('div');lbl.className='col-lbl';lbl.textContent=ci===0?'Words':'Meanings';
      const col=document.createElement('div');col.className='col-cards';
      cards.forEach(p=>{
        const div=document.createElement('div');
        const isSel=ci===0?(selWord&&selWord.idx===p.idx):(selMean&&selMean.idx===p.idx);
        div.className='mcard'+(matched.has(p.idx)?' matched':'')+(isSel?' selected':'')+(locked?' locked':'');
        div.dataset.idx=p.idx;div.textContent=ci===0?p.word:p.meaning;
        if(!matched.has(p.idx)&&!locked){
          div.addEventListener('click',()=>ci===0?clickWord(p):clickMean(p));
        }
        col.appendChild(div);
      });
      wrap.appendChild(lbl);wrap.appendChild(col);layout.appendChild(wrap);
    });
    content.appendChild(layout);
  }

  function clickWord(p){if(locked||matched.has(p.idx))return;selWord=p;renderGame();if(selMean)check()}
  function clickMean(p){if(locked||matched.has(p.idx))return;selMean=p;renderGame();if(selWord)check()}
  function check(){
    tries++;
    if(selWord.idx===selMean.idx){
      matched.add(selWord.idx);selWord=null;selMean=null;renderGame();
      if(matched.size===n)setTimeout(()=>onDone(pageWrong),300);
    }else{
      wrong++;
      const wo=selWord,mo=selMean;
      if(!pageWrong.find(x=>x.word===wo.word))pageWrong.push({word:wo.word,meaning:wo.meaning});
      if(week&&wo.word)week.wrongCounts[wo.word]=(week.wrongCounts[wo.word]||0)+1;
      save(state);locked=true;renderGame();
      const wE=document.querySelector(`#content .match-layout .col-wrap:first-child .mcard[data-idx="${wo.idx}"]`);
      const mE=document.querySelector(`#content .match-layout .col-wrap:last-child .mcard[data-idx="${mo.idx}"]`);
      if(wE)wE.classList.add('wrong');if(mE)mE.classList.add('wrong');
      setTimeout(()=>{locked=false;selWord=null;selMean=null;renderGame()},700);
    }
  }
  renderGame();
}

/* ── BULK IMPORT ── */
function parseBulkText(raw){
  const results=[];
  raw.split('\n').forEach(line=>{
    const l=line.trim();if(!l)return;
    let word='',meaning='';
    if(l.includes('\t')){
      const p=l.split('\t');word=p[0].trim();meaning=p.slice(1).join('\t').trim();
    }else if(/^(.+?)\s*[:\/—–]\s*(.+)$/.test(l)){
      const m=l.match(/^(.+?)\s*[:\/—–]\s*(.+)$/);word=m[1].trim();meaning=m[2].trim();
    }else if(/^(.+?)\s+-\s+(.+)$/.test(l)){
      const m=l.match(/^(.+?)\s+-\s+(.+)$/);word=m[1].trim();meaning=m[2].trim();
    }else if(/^([A-Za-z][A-Za-z0-9 ''\-]*?)\s+([\uAC00-\uD7A3\u3040-\u30FF\u4E00-\u9FFF].*)$/.test(l)){
      const m=l.match(/^([A-Za-z][A-Za-z0-9 ''\-]*?)\s+([\uAC00-\uD7A3\u3040-\u30FF\u4E00-\u9FFF].*)$/);word=m[1].trim();meaning=m[2].trim();
    }else if(/^([\uAC00-\uD7A3\u3040-\u30FF\u4E00-\u9FFF]\S*(?:\s+\S+)*?)\s+([A-Za-z].*)$/.test(l)){
      const m=l.match(/^([\uAC00-\uD7A3\u3040-\u30FF\u4E00-\u9FFF]\S*(?:\s+\S+)*?)\s+([A-Za-z].*)$/);word=m[1].trim();meaning=m[2].trim();
    }else{
      const sp=l.indexOf(' ');
      if(sp>0){word=l.slice(0,sp).trim();meaning=l.slice(sp+1).trim();}
      else{word=l;meaning='';}
    }
    if(word&&meaning)results.push({word,meaning,ok:true});
    else if(word)results.push({word,meaning:'',ok:false,raw:l});
  });
  return results;
}

function commitBulk(){
  if(_bWIdx===null||_bD===null)return;
  const parsed=parseBulkText(document.getElementById('bulk-ta').value).filter(p=>p.ok);
  if(!parsed.length){closeBulk();return}
  const wIdx=_bWIdx,d=_bD;
  const week=getWeek(wIdx);
  if(!week){closeBulk();return}
  parsed.forEach(p=>week.days[d].push({word:p.word,meaning:p.meaning}));
  save(state);
  document.getElementById('bulk-overlay').style.display='none';
  _bWIdx=null;_bD=null;
  renderWordList(week,d);
}

/* ── SYNC ── */
function compressPayload(obj){
  return JSON.stringify(obj)
    .replace(/"weeks":/g,'"W":').replace(/"days":/g,'"D":')
    .replace(/"wrongCounts":/g,'"E":').replace(/"word":/g,'"w":')
    .replace(/"meaning":/g,'"m":').replace(/"streak":/g,'"S":')
    .replace(/"lastDate":/g,'"L":').replace(/"_delta":/g,'"d":')
    .replace(/"_days":/g,'"dd":').replace(/"_multiLang":/g,'"ML":')
    .replace(/"exportedAt":/g,'"eA":').replace(/"langs":/g,'"lg":')
    .replace(/"delta":/g,'"dt":').replace(/"name":/g,'"n":')
    .replace(/"color":/g,'"c":').replace(/"idx":/g,'"i":')
    .replace(/"openWeeks":/g,'"oW":').replace(/"curWeek":/g,'"cW":')
    .replace(/"curDay":/g,'"cD":');
}
function decompressPayload(json){
  return json
    .replace(/"W":/g,'"weeks":').replace(/"D":/g,'"days":')
    .replace(/"E":/g,'"wrongCounts":').replace(/"w":/g,'"word":')
    .replace(/"m":/g,'"meaning":').replace(/"S":/g,'"streak":')
    .replace(/"L":/g,'"lastDate":').replace(/"d":/g,'"_delta":')
    .replace(/"dd":/g,'"_days":').replace(/"ML":/g,'"_multiLang":')
    .replace(/"eA":/g,'"exportedAt":').replace(/"lg":/g,'"langs":')
    .replace(/"dt":/g,'"delta":').replace(/"n":/g,'"name":')
    .replace(/"c":/g,'"color":').replace(/"i":/g,'"idx":')
    .replace(/"oW":/g,'"openWeeks":').replace(/"cW":/g,'"curWeek":')
    .replace(/"cD":/g,'"curDay":');
}
function encodeData(obj){
  return btoa(unescape(encodeURIComponent(compressPayload(obj))));
}
function decodeData(str){
  try{
    const compressed=decodeURIComponent(escape(atob(str.trim())));
    const json=compressed.includes('"W":')
      ?decompressPayload(compressed):compressed;
    return JSON.parse(json);
  }catch{return null}
}

function buildDeltaPayload(lang,days=3){
  const today=new Date();
  const cycleStart=lang.cycleStart||lang.lastDate||today.toISOString().slice(0,10);
  const cycleStartMs=new Date(cycleStart).getTime();
  const recentDayNums=new Set();
  for(let i=0;i<days;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const diffDays=Math.floor((d.getTime()-cycleStartMs)/86400000);
    const dayNum=(diffDays%7)+1;
    if(dayNum>=1&&dayNum<=7)recentDayNums.add(dayNum);
  }
  const deltaWeeks=(lang.weeks||[]).map(week=>{
    const deltaDays={};
    recentDayNums.forEach(d=>{const words=week.days[d]||[];if(words.length>0)deltaDays[d]=words});
    if(Object.keys(deltaDays).length===0)return null;
    return{idx:week.idx,days:deltaDays,wrongCounts:week.wrongCounts||{}};
  }).filter(Boolean);
  return{_delta:true,_days:days,weeks:deltaWeeks,streak:lang.streak||0,lastDate:lang.lastDate||null};
}

function mergeDelta(base,delta){
  const result=JSON.parse(JSON.stringify(base));
  delta.weeks.forEach(dWeek=>{
    const existing=result.weeks.find(w=>w.idx===dWeek.idx);
    if(existing){
      Object.keys(dWeek.days).forEach(d=>{existing.days[d]=dWeek.days[d]});
      Object.keys(dWeek.wrongCounts||{}).forEach(word=>{
        existing.wrongCounts[word]=Math.max(existing.wrongCounts[word]||0,dWeek.wrongCounts[word]||0);
      });
    }else{
      const fullDays={};for(let d=1;d<=7;d++)fullDays[d]=dWeek.days[d]||[];
      result.weeks.push({idx:dWeek.idx,days:fullDays,wrongCounts:dWeek.wrongCounts||{}});
    }
  });
  if(delta.lastDate&&delta.lastDate>=(result.lastDate||'')){
    result.streak=delta.streak;result.lastDate=delta.lastDate;
  }
  return result;
}

let _syncExportCode='';

function openSync(){
  const langDeltas=state.langs.map(lang=>{
    const delta=buildDeltaPayload(lang,3);
    return{id:lang.id,name:lang.name,delta};
  });
  const payload={_multiLang:true,_delta:true,_days:3,langs:langDeltas,exportedAt:todayStr()};
  _syncExportCode=encodeData(payload);
  document.getElementById('sync-export-box').textContent=_syncExportCode;
  let totalWords=0;
  langDeltas.forEach(l=>l.delta.weeks.forEach(w=>Object.values(w.days).forEach(arr=>totalWords+=arr.length)));
  const fullSize=encodeData({langs:state.langs}).length;
  const deltaSize=_syncExportCode.length;
  const saving=fullSize>deltaSize?Math.round((1-deltaSize/fullSize)*100):0;
  document.getElementById('sync-size-hint').textContent=
    `${state.langs.length}개 언어 · 최근 3일 · ${totalWords}개 단어 · ${deltaSize}자${saving>0?' (전체 대비 '+saving+'% 절약)':''}`;
  document.getElementById('sync-import-ta').value='';
  document.getElementById('sync-import-btn').disabled=true;
  const btn=document.getElementById('sync-copy-btn');
  btn.innerHTML='<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="#fff" stroke-width="1.6"/><path d="M3 11V3a2 2 0 0 1 2-2h8" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg> 전체 복사';
  btn.classList.remove('copied');
  document.getElementById('sync-overlay').style.display='flex';
}
function closeSync(){document.getElementById('sync-overlay').style.display='none';}

/* ── BOOT ── */
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('menu-btn').addEventListener('click',toggleDrawer);
  document.getElementById('scrim').addEventListener('click',closeDrawer);
  document.getElementById('btn-all').addEventListener('click',function(){showAll();closeDrawer()});
  document.getElementById('add-week-btn').addEventListener('click',addWeek);
  document.getElementById('how-to-btn').addEventListener('click',function(){openOnboarding();closeDrawer()});
  document.getElementById('sync-drawer-btn').addEventListener('click',function(){openSync();closeDrawer()});

  document.getElementById('bulk-ta').addEventListener('input',updateBulkPreview);
  document.getElementById('bulk-cancel-btn').addEventListener('click',closeBulk);
  document.getElementById('bulk-add-btn').addEventListener('click',commitBulk);
  document.getElementById('bulk-overlay').addEventListener('click',function(e){if(e.target===this)closeBulk()});

  document.getElementById('sync-close-btn').addEventListener('click',closeSync);
  document.getElementById('sync-overlay').addEventListener('click',function(e){if(e.target===this)closeSync()});

  document.getElementById('sync-copy-btn').addEventListener('click',function(){
    const btn=this;
    function onSuccess(){
      btn.innerHTML='<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 8l4 4 8-8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> 복사됨!';
      btn.classList.add('copied');
      setTimeout(()=>{
        btn.innerHTML='<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="#fff" stroke-width="1.6"/><path d="M3 11V3a2 2 0 0 1 2-2h8" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg> 전체 복사';
        btn.classList.remove('copied');
      },2200);
    }
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(_syncExportCode).then(onSuccess).catch(()=>fallbackCopy(btn));
    }else{fallbackCopy(btn)}
  });

  function fallbackCopy(btn){
    const ta=document.createElement('textarea');
    ta.value=_syncExportCode;ta.style.cssText='position:fixed;top:-9999px;opacity:0';
    document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,99999);
    try{
      document.execCommand('copy');
      btn.innerHTML='<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 8l4 4 8-8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> 복사됨!';
      btn.classList.add('copied');
      setTimeout(()=>{
        btn.innerHTML='<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="#fff" stroke-width="1.6"/><path d="M3 11V3a2 2 0 0 1 2-2h8" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg> 전체 복사';
        btn.classList.remove('copied');
      },2200);
    }catch{alert('복사에 실패했습니다. 코드를 직접 선택해서 복사해주세요.')}
    document.body.removeChild(ta);
  }

  document.getElementById('sync-import-ta').addEventListener('input',function(){
    const v=this.value.trim();
    const btn=document.getElementById('sync-import-btn');
    if(!v){btn.disabled=true;return}
    const decoded=decodeData(v);
    if(decoded&&(decoded.langs||decoded.weeks)){btn.disabled=false;return}
    try{const p=JSON.parse(v);btn.disabled=!(p&&(p.langs||p.weeks));}
    catch{btn.disabled=true;}
  });

  document.getElementById('sync-import-btn').addEventListener('click',function(){
    const raw=document.getElementById('sync-import-ta').value.trim();
    let parsed=decodeData(raw);
    if(!parsed){try{parsed=JSON.parse(raw)}catch{parsed=null}}
    if(!parsed){alert('유효하지 않은 코드입니다.');return}
    if(parsed._multiLang&&parsed.langs){
      // 멀티언어 delta 병합
      parsed.langs.forEach(incoming=>{
        const existing=state.langs.find(l=>l.id===incoming.id);
        if(existing){
          const merged=mergeDelta(existing,incoming.delta);
          Object.assign(existing,{weeks:merged.weeks,streak:merged.streak,lastDate:merged.lastDate});
        }else if(state.langs.length<3){
          const newLang=makeLang(incoming.id,incoming.name);
          const merged=mergeDelta(newLang,incoming.delta);
          newLang.weeks=merged.weeks;newLang.streak=merged.streak;newLang.lastDate=merged.lastDate;
          state.langs.push(newLang);
        }
      });
      state.seenOnboarding=true;
      try{localStorage.setItem(SK,JSON.stringify(state));location.reload();}
      catch(e){alert('저장 중 오류: '+e.message)}
    }else if(parsed.weeks){
      // 구버전 단일언어 → 현재 언어에 병합
      if(parsed._delta){
        const merged=mergeDelta(cL(),parsed);
        Object.assign(cL(),{weeks:merged.weeks,streak:merged.streak,lastDate:merged.lastDate});
      }else{
        cL().weeks=parsed.weeks||cL().weeks;
        if(parsed.streak)cL().streak=parsed.streak;
        if(parsed.lastDate)cL().lastDate=parsed.lastDate;
      }
      state.seenOnboarding=true;
      try{localStorage.setItem(SK,JSON.stringify(state));location.reload();}
      catch(e){alert('저장 중 오류: '+e.message)}
    }else{alert('유효하지 않은 형식입니다.');}
  });

  document.getElementById('lang-modal-close-btn').addEventListener('click',closeLangModal);
  document.getElementById('lang-modal-overlay').addEventListener('click',function(e){if(e.target===this)closeLangModal();});

  initCycle();
});
</script>
</body>
</html>
